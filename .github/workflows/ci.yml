name: CI

on:
  push: {}
  pull_request: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Pytest
        run: python -m pytest

      - name: Run Behave
        run: python -m behave

      - name: Generate HTML report
        run: python -m pytest --html=reports/report.html --self-contained-html

      - name: Ensure output folders exist
        run: |
          mkdir -p reports
          mkdir -p screenshots
          mkdir -p logs
          touch logs/automation.log

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports
          retention-days: 90

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots
          retention-days: 90

      - name: Upload automation log artifact
        uses: actions/upload-artifact@v4
        with:
          name: automation-log
          path: logs/automation.log
          retention-days: 90
